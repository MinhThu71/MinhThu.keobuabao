<!-- Biểu tượng SVG Sprite cho game Kéo–Búa–Bao -->
<!-- Dùng dạng <symbol> để tái sử dụng với <use href="#icon-..."> -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <!-- Biểu tượng KÉO (Scissors) -->
  <symbol id="icon-scissors" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Tay cầm trên -->
      <ellipse cx="28" cy="22" rx="12" ry="8" fill="currentColor" opacity="0.15" stroke="currentColor"/>
      <!-- Tay cầm dưới -->
      <ellipse cx="28" cy="78" rx="12" ry="8" fill="currentColor" opacity="0.15" stroke="currentColor"/>
      <!-- Lưỡi kéo trên -->
      <line x1="38" y1="22" x2="80" y2="55"/>
      <!-- Lưỡi kéo dưới -->
      <line x1="38" y1="78" x2="80" y2="45"/>
      <!-- Điểm giao nhau -->
      <circle cx="58" cy="50" r="4" fill="currentColor"/>
      <!-- Vòng tay cầm trên -->
      <ellipse cx="22" cy="22" rx="12" ry="8"/>
      <!-- Vòng tay cầm dưới -->
      <ellipse cx="22" cy="78" rx="12" ry="8"/>
    </g>
  </symbol>

  <!-- Biểu tượng BÚA (Rock/Fist) -->
  <symbol id="icon-rock" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Nắm đấm -->
      <rect x="20" y="40" width="60" height="38" rx="12" fill="currentColor" opacity="0.15" stroke="currentColor"/>
      <!-- Ngón tay gập lại -->
      <rect x="25" y="25" width="12" height="22" rx="6" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <rect x="41" y="20" width="12" height="26" rx="6" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <rect x="57" y="22" width="12" height="24" rx="6" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <!-- Ngón cái -->
      <path d="M20 55 Q10 50 14 40 Q18 32 26 36" stroke="currentColor" stroke-width="4"/>
      <!-- Đường nếp khớp -->
      <line x1="30" y1="47" x2="30" y2="78" stroke="currentColor" opacity="0.4" stroke-width="2"/>
      <line x1="50" y1="47" x2="50" y2="78" stroke="currentColor" opacity="0.4" stroke-width="2"/>
      <line x1="70" y1="47" x2="70" y2="78" stroke="currentColor" opacity="0.4" stroke-width="2"/>
    </g>
  </symbol>

  <!-- Biểu tượng BAO (Paper/Hand) -->
  <symbol id="icon-paper" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Lòng bàn tay -->
      <rect x="28" y="55" width="44" height="32" rx="8" fill="currentColor" opacity="0.15" stroke="currentColor"/>
      <!-- Ngón trỏ -->
      <rect x="30" y="18" width="10" height="42" rx="5" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <!-- Ngón giữa -->
      <rect x="44" y="14" width="10" height="46" rx="5" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <!-- Ngón áp út -->
      <rect x="58" y="18" width="10" height="42" rx="5" fill="currentColor" opacity="0.12" stroke="currentColor"/>
      <!-- Ngón út -->
      <rect x="30" y="18" width="10" height="42" rx="5"/>
      <rect x="44" y="14" width="10" height="46" rx="5"/>
      <rect x="58" y="18" width="10" height="42" rx="5"/>
      <!-- Ngón cái -->
      <path d="M28 72 Q16 68 16 58 Q16 50 24 50 L28 52" stroke="currentColor" stroke-width="4"/>
    </g>
  </symbol>

  <!-- Logo mini game -->
  <symbol id="icon-logo" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <text x="20" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="currentColor" font-family="sans-serif">✊</text>
  </symbol>

  <!-- Biểu tượng Âm thanh bật -->
  <symbol id="icon-sound-on" viewBox="0 0 24 24">
    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- Biểu tượng Âm thanh tắt -->
  <symbol id="icon-sound-off" viewBox="0 0 24 24">
    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
    <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Biểu tượng Mặt trăng (theme tối) -->
  <symbol id="icon-moon" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
  </symbol>

  <!-- Biểu tượng Mặt trời (theme sáng) -->
  <symbol id="icon-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5" fill="currentColor"/>
    <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Biểu tượng Reset -->
  <symbol id="icon-reset" viewBox="0 0 24 24">
    <polyline points="1 4 1 10 7 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3.51 15a9 9 0 1 0 .49-6.51" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Biểu tượng Trợ giúp -->
  <symbol id="icon-help" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Biểu tượng Hiệu ứng bật -->
  <symbol id="icon-fx-on" viewBox="0 0 24 24">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>
  </symbol>

  <!-- Biểu tượng Trận thắng (trophy) -->
  <symbol id="icon-trophy" viewBox="0 0 24 24">
    <polyline points="8 3 8 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <polyline points="16 3 16 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 3h16v6a8 8 0 0 1-16 0V3z" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M4 6H2a2 2 0 0 0 0 4h2" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M20 6h2a2 2 0 0 1 0 4h-2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="12" y1="15" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

</svg>
